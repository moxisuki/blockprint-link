buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle',
                 version: '6.0.54'
    }
}

plugins {
    id 'multiloader-loader'
}

apply plugin: 'net.minecraftforge.gradle'

java {
    toolchain { languageVersion = JavaLanguageVersion.of(21) }
}

minecraft {
    mappings channel: 'official', version: '1.21.1'
    runs {
        configureEach { workingDirectory project.file('run') }
        client { property 'forge.enabledGameTestNamespaces', mod_id }
        server { property 'forge.enabledGameTestNamespaces', mod_id }
    }
}

repositories { mavenLocal(); mavenCentral() }

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    implementation "io.github.moxisuki:blockprint-core-jvm:${core_version}"
    implementation "com.google.zxing:core:${zxing_version}"
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
