name: Release (BETA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag suffix (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: neoforge-1.21.1
            task: ':neoforge-1_21_1:jar'
            jdk: 21
          - name: neoforge-1.21.4
            task: ':neoforge-1_21_4:jar'
            jdk: 21
          - name: neoforge-1.21.8
            task: ':neoforge-1_21_8:jar'
            jdk: 21
          - name: neoforge-26.1.2
            task: ':neoforge-1_26_1_2:jar'
            jdk: 21
            env:
              JAVA_TOOLCHAIN_26: /opt/hostedtoolcache/jdk/26.0.1/x64
          - name: forge-1.20.1
            task: ':forge-1_20_1:jar'
            jdk: 21
          - name: forge-1.21.1
            task: ':forge-1_21_1:jar'
            jdk: 21
          - name: fabric-1.21.1
            task: ':fabric-1_21_1:remapJar'
            jdk: 21
          - name: fabric-1.21.4
            task: ':fabric-1_21_4:remapJar'
            jdk: 21
          - name: fabric-1.21.8
            task: ':fabric-1_21_8:remapJar'
            jdk: 21
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-javadoc.jar
            !**/build/libs/*-dev.jar

  build-fabric-26:
    name: Build fabric-26.1.2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Build (standalone)
        working-directory: fabric-1_26_1_2
        run: ./gradlew jar --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-26.1.2
          path: fabric-1_26_1_2/build/libs/*.jar

  release:
    name: Create Release
    needs: [build, build-fabric-26]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: BETA-${{ inputs.version }}
          name: BETA ${{ inputs.version }}
          files: artifacts/**/*.jar
          draft: false
          prerelease: true
          generate_release_notes: true
