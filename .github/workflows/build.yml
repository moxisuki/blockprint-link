name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: neoforge-1.21.1
            task: ':neoforge-1_21_1:jar'
          - name: neoforge-1.21.4
            task: ':neoforge-1_21_4:jar'
          - name: neoforge-1.21.8
            task: ':neoforge-1_21_8:jar'
          - name: forge-1.20.1
            task: ':forge-1_20_1:build'
          - name: forge-1.21.1
            task: ':forge-1_21_1:build'
          - name: fabric-1.21.1
            task: ':fabric-1_21_1:remapJar'
          - name: fabric-1.21.4
            task: ':fabric-1_21_4:remapJar'
          - name: fabric-1.21.8
            task: ':fabric-1_21_8:remapJar'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew ${{ matrix.task }} --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            **/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-javadoc.jar
            !**/build/libs/*-dev.jar
